<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>出荷入力</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
body {
  font-family: sans-serif;
  padding: 10px;
  margin: 0;
}

#date {
  font-size: 20px;
  margin-bottom: 5px;
}

/* 担当ボタン */
#userButtons{
  margin-bottom:5px;
}

#userButtons button{
  width:120px;   /* 横2倍 */
  height:40px;   /* 高さ元に戻す */
  font-size:18px; /* 文字は会社名なので少し調整 */
  margin-right:5px;
  background:#ddd;
  border:none;
  border-radius:6px;
}

.activeUser{
  background:#2196f3 !important;
  color:#fff;
}

/* リスト */
#list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 18px;
  border: 2px solid #999;
  padding: 4px;
  border-radius: 6px;
}

button {
  width: 38px;
  height: 38px;
  font-size: 18px;
}

.qty {
  width: 38px;
  height: 38px;
  line-height: 38px;
  text-align: center;
  font-size: 18px;
  display: inline-block;
  border-radius: 6px;
}

.zero {
  background: #ccc;
  color: #666;
}

#total {
  font-size: 20px;
  margin-top: 5px;
  position: sticky;
  bottom: 0;
  background: white;
  padding: 5px;
  border-top: 2px solid #999;
}

.save {
  width: 100%;
  height: 40px;
  font-size: 18px;
  margin-top: 5px;
}

.save:nth-of-type(1){ background:#4caf50; color:#fff; }
.save:nth-of-type(2){ background:#00c300; color:#fff; }
.save:nth-of-type(3){ background:#f44336; color:#fff; }
</style>

</head>

<body>

<div id="date"></div>

<div id="userButtons">
  <button onclick="setUser('東伸水産')" id="user_A">東伸水産</button>
  <button onclick="setUser('青山水産')" id="user_B">青山水産</button>
  <button onclick="setUser('カネツル青果')" id="user_C">カネツル青果</button>
</div>

<div id="list"></div>
<div id="total">合計：0</div>

<button class="save" onclick="save()">保存</button>
<button class="save" onclick="shareLine()">LINEで送る</button>
<button class="save" onclick="resetAll()">リセット</button>

<script>
const stores = [
  "湖西","高塚","北寺島","有玉","引佐",
  "磐田","袋井","中野","袋井南","掛川",
  "成滝","菊川","静波","石津","井口",
  "藤枝","丸子","富士見","清水","竜南","大坪"
];

const data = {};
let currentUser = "東伸水産";

const today = new Date().toISOString().slice(0,10);
document.getElementById("date").innerText = today;

const list = document.getElementById("list");

// --- 担当切替 ---
function setUser(name){
  currentUser = name;
  localStorage.setItem("user", name);

  document.querySelectorAll("#userButtons button").forEach(btn=>{
    btn.classList.remove("activeUser");
  });

  // 対応ボタンを判定
  if(name === "東伸水産") document.getElementById("user_A").classList.add("activeUser");
  if(name === "青山水産") document.getElementById("user_B").classList.add("activeUser");
  if(name === "カネツル青果") document.getElementById("user_C").classList.add("activeUser");
}

// --- 担当読み込み ---
function loadUser(){
  const saved = localStorage.getItem("user");
  if(saved){
    currentUser = saved;
  }
  setUser(currentUser);
}

// --- 店舗UI生成 ---
stores.forEach((name, index) => {
  data[name] = 0;

  const row = document.createElement("div");
  row.className = "row";

  row.innerHTML = `
    <span>${name}</span>
    <div>
      <button onclick="change(${index}, -1)">-</button>
      <span id="qty${index}" class="qty zero">0</span>
      <button onclick="change(${index}, 1)">+</button>
    </div>
  `;

  list.appendChild(row);
});

// --- 数量変更 ---
function change(index, val){
  const name = stores[index];
  data[name] = Math.max(0, data[name] + val);

  const el = document.getElementById("qty"+index);
  el.innerText = data[name];

  if(data[name] === 0){
    el.classList.add("zero");
  }else{
    el.classList.remove("zero");
  }

  updateTotal();
}

// --- 合計 ---
function updateTotal(){
  let sum = 0;
  for(let key in data){
    sum += data[key];
  }
  document.getElementById("total").innerText = "合計：" + sum;
}

// --- 保存 ---
function save(){
  const payload = {
    user: currentUser,
    data: data
  };

  localStorage.setItem("shipment_" + today, JSON.stringify(payload));
  alert("保存OK");
}

// --- 読み込み ---
function load(){
  const saved = localStorage.getItem("shipment_" + today);
  if(saved){
    const parsed = JSON.parse(saved);

    if(parsed.user){
      currentUser = parsed.user;
    }

    const savedData = parsed.data || parsed;

    for(let i=0; i<stores.length; i++){
      const name = stores[i];
      data[name] = savedData[name] || 0;

      const el = document.getElementById("qty"+i);
      el.innerText = data[name];

      if(data[name] === 0){
        el.classList.add("zero");
      }else{
        el.classList.remove("zero");
      }
    }
  }

  setUser(currentUser);
  updateTotal();
}

// --- LINE送信 ---
function shareLine(){
  let text = "出荷報告（" + today + "）\n";
  text += "担当：" + currentUser + "\n\n";

  let sum = 0;
  for(let key in data){
    sum += data[key];
  }

  if(sum === 0){
    text += "出荷なし";
  }else{
    for(let name of stores){
      if(data[name] > 0){
        text += name + "：" + data[name] + "\n";
      }
    }
    text += "合計：" + sum;
  }

  const url = "https://line.me/R/msg/text/?" + encodeURIComponent(text.trim());
  window.open(url, "_blank");
}

// --- リセット ---
function resetAll(){
  if(!confirm("すべての数量をリセットしますか？")) return;

  for(let i=0; i<stores.length; i++){
    const name = stores[i];
    data[name] = 0;

    const el = document.getElementById("qty"+i);
    el.innerText = 0;
    el.classList.add("zero");
  }

  updateTotal();

  localStorage.setItem("shipment_" + today, JSON.stringify({
    user: currentUser,
    data: data
  }));
}

// 初期化
loadUser();
load();

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
