<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>出荷入力</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
body {
  font-family: sans-serif;
  padding: 10px;
  margin: 0;
}

#list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 18px;
  border: 2px solid #999;
  padding: 4px;
  border-radius: 6px;
}

button {
  width: 38px;
  height: 38px;
  font-size: 18px;
}

.qty {
  width: 38px;
  height: 38px;
  line-height: 38px;
  text-align: center;
  font-size: 18px;
  display: inline-block;
  border-radius: 6px;
}

.zero {
  background: #ccc;
  color: #666;
}

#date {
  font-size: 20px;
  margin-bottom: 5px;
}

#total {
  font-size: 20px;
  margin-top: 5px;
}

.save {
  width: 100%;
  height: 40px;
  font-size: 18px;
  margin-top: 5px;
}
</style>
</head>

<body>

<div id="date"></div>
<div id="list"></div>
<div id="total">合計：0</div>

<button class="save" onclick="save()">保存</button>
<button class="save" onclick="shareLine()">LINEで送る</button>

<script>
const stores = [
  "湖西","高塚","北寺島","有玉","引佐",
  "磐田","袋井","中野","袋井南","掛川",
  "成滝","菊川","静波","石津","井口",
  "藤枝","丸子","富士見","清水","竜南","大坪"
];

const data = {};

const today = new Date().toISOString().slice(0,10);
document.getElementById("date").innerText = today;

const list = document.getElementById("list");

stores.forEach((name, index) => {
  data[name] = 0;

  const row = document.createElement("div");
  row.className = "row";

  row.innerHTML = `
    <span>${name}</span>
    <div>
      <button onclick="change(${index}, -1)">-</button>
      <span id="qty${index}" class="qty zero">0</span>
      <button onclick="change(${index}, 1)">+</button>
    </div>
  `;

  list.appendChild(row);
});

function change(index, val){
  const name = stores[index];
  data[name] = Math.max(0, data[name] + val);

  const el = document.getElementById("qty"+index);
  el.innerText = data[name];

  if(data[name] === 0){
    el.classList.add("zero");
  }else{
    el.classList.remove("zero");
  }

  updateTotal();
}

function updateTotal(){
  let sum = 0;
  for(let key in data){
    sum += data[key];
  }
  document.getElementById("total").innerText = "合計：" + sum;
}

function save(){
  localStorage.setItem("shipment_" + today, JSON.stringify(data));
  alert("保存OK");
}

function load(){
  const saved = localStorage.getItem("shipment_" + today);
  if(saved){
    const parsed = JSON.parse(saved);
    for(let i=0; i<stores.length; i++){
      const name = stores[i];
      data[name] = parsed[name] || 0;

      const el = document.getElementById("qty"+i);
      el.innerText = data[name];

      if(data[name] === 0){
        el.classList.add("zero");
      }else{
        el.classList.remove("zero");
      }
    }
  }
  updateTotal();
}

function shareLine(){
  let text = "出荷報告（" + today + "）\n";

  let sum = 0;
  for(let key in data){
    sum += data[key];
  }

  if(sum === 0){
    text += "出荷なし";
  }else{
    for(let name of stores){
      if(data[name] > 0){
        text += name + "：" + data[name] + "\n";
      }
    }
    text += "合計：" + sum;
  }

  const url = "https://line.me/R/msg/text/?" + encodeURIComponent(text);
  window.open(url, "_blank");
}

load();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
