<!DOCTYPE html>
<html lang="ja">
<link rel="manifest" href="manifest.json">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>出荷入力（音声対応）</title>

<style>
body {
  font-family: sans-serif;
  padding: 10px;
  margin: 0;
}

#date {
  font-size: 20px;
  margin-bottom: 5px;
}

/* 担当 */
#userButtons {
  display:flex;
  gap:5px;
}
#userButtons button{
  flex:1;
  height:40px;
  font-size:16px;
  background:#ddd;
  border:none;
  border-radius:6px;
}

.activeUser{
  background:#2196f3 !important;
  color:#fff;
}

/* リスト */
#list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 18px;
  border: 2px solid #999;
  padding: 4px;
  border-radius: 6px;
}

.qty {
  width: 38px;
  height: 38px;
  line-height: 38px;
  text-align: center;
  border-radius: 6px;
}

.zero {
  background: #ccc;
  color: #666;
}

.unknown {
  background: #ff9800;
  color:#fff;
  font-weight:bold;
}

.row button {
  width: 38px;
  height: 38px;
}

/* 全店 */
.allButtons {
  display: flex;
  gap: 10px;
  margin: 5px 0;
}
.allButtons button {
  flex:1;
  height:40px;
  background:#f;
  border-radius:6px;
}

/* アクション */
.actionButtons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
}

.actionButtons button {
  height:38px;
  border-radius:6px;
}

/* 色分け */
.actionButtons button:nth-child(1){background:#c8e6c9;}
.actionButtons button:nth-child(2){background:#00c300;color:#fff;}
.actionButtons button:nth-child(3){background:#ffcdd2;}
.actionButtons button:nth-child(4){background:#fff9c4;}
.actionButtons button:nth-child(5){background:#bbdefb;}

#total {
  font-size: 20px;
  position: sticky;
  bottom: 0;
  background: white;
}

/* 音声ログ */
#voiceLog{
  font-size:12px;
  margin-top:5px;
  max-height:100px;
  overflow:auto;
  border-top:1px solid #ccc;
}
</style>
</head>

<body>

<div id="date"></div>

<div id="userButtons">
  <button onclick="setUser('東伸水産')" id="user_A">東伸水産</button>
  <button onclick="setUser('青山水産')" id="user_B">青山水産</button>
  <button onclick="setUser('カネツル')" id="user_C">カネツル</button>
  <button onclick="setCustomUser()" id="user_D">＋</button>
</div>

<div id="list"></div>

<div class="allButtons">
  <button onclick="changeAll(-1)">全店－1</button>
  <button onclick="changeAll(1)">全店＋1</button>
</div>

<div id="total">合計：0</div>

<div class="actionButtons">
  <button onclick="save()">保存</button>
  <button onclick="shareLine()">LINE</button>
  <button onclick="resetAll()">リセット</button>
  <button onclick="exportCSV()">CSV</button>
  <button onclick="toggleVoice()" id="voiceBtn">??音声</button>
</div>

<div id="voiceLog"></div>

<script>
const stores = [
  {name:"湖西", color:"#ffe0e0"},
  {name:"高塚", color:"#ffe0e0"},
  {name:"北寺島", color:"#e0e0ff"},
  {name:"有玉", color:"#e0e0ff"},
  {name:"引佐", color:"#e0e0ff"},
  {name:"磐田", color:"#ffffe0"},
  {name:"袋井", color:"#ffffe0"},
  {name:"中野", color:"#ffe0ff"},
  {name:"袋井南", color:"#ffe0ff"},
  {name:"掛川", color:"#e1f5fe"},
  {name:"成滝", color:"#e1f5fe"},
  {name:"菊川", color:"#e1f5fe"},
  {name:"静波", color:"#ffe0e0"},
  {name:"石津", color:"#ffe0e0"},
  {name:"井口", color:"#e0e0ff"},
  {name:"藤枝", color:"#e0e0ff"},
  {name:"丸子", color:"#ffffe0"},
  {name:"富士見", color:"#ffffe0"},
  {name:"清水", color:"#ffe0ff"},
  {name:"竜南", color:"#ffe0ff"},
  {name:"大坪", color:"#ffe0ff"}
];

const data = {};
let currentUser = "東伸水産";

/* 日付 */
const now = new Date();
const today = now.toISOString().slice(0,10);
document.getElementById("date").innerText = today;

/* 店舗 */
const list = document.getElementById("list");
stores.forEach((s,i)=>{
  data[s.name]=0;
  const row=document.createElement("div");
  row.className="row";
  row.style.background=s.color;
  row.innerHTML=`
    <span>${s.name}</span>
    <div>
      <button onclick="change(${i},-1)">-</button>
      <span id="qty${i}" class="qty zero">0</span>
      <button onclick="change(${i},1)">+</button>
    </div>
  `;
  list.appendChild(row);
});

function updateDisplay(i){
  const name=stores[i].name;
  const el=document.getElementById("qty"+i);
  if(data[name]===null){
    el.innerText="?";
    el.className="qty unknown";
  }else{
    el.innerText=data[name];
    el.className="qty";
    if(data[name]===0) el.classList.add("zero");
  }
}

function change(i,val){
  const name=stores[i].name;
  if(data[name]===null){
    if(val===1) data[name]=1;
  }else{
    if(val===-1 && data[name]===0){
      data[name]=null;
    }else{
      data[name]=Math.max(0,data[name]+val);
    }
  }
  updateDisplay(i);
  updateTotal();
}

function changeAll(val){
  stores.forEach((s,i)=>{
    const name=s.name;
    if(data[name]===null){
      if(val===1) data[name]=1;
    }else{
      if(val===-1 && data[name]===0){
        data[name]=null;
      }else{
        data[name]=Math.max(0,data[name]+val);
      }
    }
    updateDisplay(i);
  });
  updateTotal();
}

function updateTotal(){
  let sum=0;
  for(let k in data){
    if(data[k]!==null) sum+=data[k];
  }
  document.getElementById("total").innerText="合計："+sum;
}

/* 音声 */
let recognition;
let isListening=false;

function toggleVoice(){
  if(isListening){
    recognition.stop();
    isListening=false;
    voiceBtn.innerText="??音声";
    return;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    alert("非対応");
    return;
  }

  recognition=new SR();
  recognition.lang="ja-JP";
  recognition.continuous=true;

  recognition.start();
  isListening=true;
  voiceBtn.innerText="??停止";

  recognition.onresult=(e)=>{
    const text=e.results[e.results.length-1][0].transcript;
    log("認識："+text);
    handleVoice(text);
  };

  recognition.onend=()=>{
    if(isListening) recognition.start();
  };
}

function handleVoice(text){
  if(text.includes("終了")){
    toggleVoice();
    return;
  }

  let store=null;
  stores.forEach(s=>{
    if(text.includes(s.name)) store=s.name;
  });

  if(!store){ log("店舗不明"); return; }

  let val=null;
  if(text.includes("不明")) val=null;
  else{
    const m=text.match(/\d+/);
    if(m) val=parseInt(m[0]);
  }

  if(val===null && !text.includes("不明")){
    log("数量不明");
    return;
  }

  data[store]=val;

  stores.forEach((s,i)=>{
    if(s.name===store) updateDisplay(i);
  });

  updateTotal();
  log("OK："+store+"→"+(val===null?"?":val));
}

function log(t){
  voiceLog.innerHTML=t+"<br>"+voiceLog.innerHTML;
}
</script>

</body>
</html>
