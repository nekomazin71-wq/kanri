<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">

<title>出荷入力</title>

<style>
body {
  font-family: sans-serif;
  padding: 10px;
  margin: 0;
  background: #fff;
}

#date {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 5px;
}

#status {
  min-height: 22px;
  margin: 4px 0 8px;
  font-size: 14px;
  color: #333;
}

#userButtons {
  display: flex;
  gap: 5px;
  margin-bottom: 8px;
}

#userButtons button {
  flex: 1;
  height: 40px;
  border: none;
  border-radius: 6px;
  background: #ddd;
  font-size: 13px;
}

.activeUser {
  background: #2196f3 !important;
  color: #fff;

}

#list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 2px solid #999;
  padding: 4px;
  border-radius: 6px;
}

.storeName {
  font-size: 15px;
}

.qty {
  display: inline-block;
  width: 38px;
  height: 38px;
  line-height: 38px;
  text-align: center;
  border-radius: 6px;
  background: #fff;

}

.zero {
  background: #ccc;
}

.unknown {
  background: #aa0000;
  color: #fff;
}

.row button {
  width: 38px;
  height: 38px;
  font-size: 18px;
}

.allButtons {
  display: flex;
  gap: 10px;
  margin: 8px 0 5px;
}

.allButtons button {
  flex: 1;
  height: 40px;
  background: #ddd;
  border: none;
  border-radius: 6px;
  font-size: 15px;
}

#total {
  position: sticky;
  bottom: 0;
  background: #fff;
  padding: 6px 5px;
  border-top: 2px solid #999;
  font-size: 18px;
  z-index: 10;
}

.actionButtons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
  margin-top: 6px;
}

.actionButtons button {
  height: 40px;
  border: none;
  border-radius: 6px;

}

.actionButtons button:nth-child(1) { background: #4caf50; color: #fff; } /* 保存 */
.actionButtons button:nth-child(2) { background: #00C300; color: #fff; } /* LINE */
.actionButtons button:nth-child(3) { background: #f44336; color: #fff; } /* リセット */
.actionButtons button:nth-child(4) { background: #2196f3; color: #fff; } /* CSV */

/* 押したとき */
button:active {
  transform: scale(0.95);
  opacity: 0.8;
}
</style>
</head>

<body>

<div id="date"></div>
<div id="userButtons"></div>
<div id="status"></div>
<div id="list"></div>

<div class="allButtons">
  <button onclick="changeAll(-1)">全店 － 1</button>
  <button onclick="changeAll(1)">全店 ＋ 1</button>
</div>

<div id="total">合計：0</div>

<div class="actionButtons">
  <button onclick="save()">保存</button>
  <button onclick="shareLine()">LINE</button>
  <button onclick="resetAll()">リセット</button>
  <button onclick="exportCSV()">CSV</button>
</div>

<script>
/* ===== 設定 ===== */
const CONFIG = {
  users: [
    { id: "A", name: "東伸水産" },
    { id: "B", name: "青山水産" },
    { id: "C", name: "カネツル" }
  ],
  stores: [
    { name: "湖西", color: "#ffe0e0" },
    { name: "高塚", color: "#ffe0e0" },
    { name: "北寺島", color: "#e0e0ff" },
    { name: "引佐", color: "#e0e0ff" },
    { name: "有玉", color: "#e0e0ff" },
    { name: "中野", color: "#ffe0ff" },
    { name: "磐田", color: "#ffffe0" },
    { name: "袋井", color: "#ffffe0" },
    { name: "掛川", color: "#e1f5fe" },
    { name: "袋井南", color: "#ffe0ff" },
    { name: "成滝", color: "#e1f5fe" },
    { name: "菊川", color: "#e1f5fe" },
    { name: "静波", color: "#ffe0e0" },
    { name: "井口", color: "#e0e0ff" },
    { name: "藤枝", color: "#e0e0ff" },
    { name: "石津", color: "#ffe0e0" },
    { name: "富士見", color: "#ffffe0" },
    { name: "丸子", color: "#ffffe0" },
    { name: "大坪", color: "#ffe0ff" },
    { name: "竜南", color: "#ffe0ff" },
    { name: "清水", color: "#ffe0ff" }
 
  ]
};

let stores = [];
let data = {};
let currentUser = "";

const list = document.getElementById("list");
const statusEl = document.getElementById("status");

/* ===== 日付：日本時間 ===== */
// Intl.DateTimeFormatを使用して日本時間の「年-月-日」を直接取得
const today = new Intl.DateTimeFormat('ja-JP', {
  year: 'numeric',
  month: '2-digit',
  day: '2-digit',
  timeZone: 'Asia/Tokyo'
}).format(new Date()).replace(/\//g, '-');
document.getElementById("date").innerText = today;

/* ===== 初期化 ===== */
stores = CONFIG.stores;
initApp();

function initApp() {
  stores.forEach((s, i) => {
    data[s.name] = 0;

    const row = document.createElement("div");
    row.className = "row";
    row.style.background = s.color;

    row.innerHTML = `
      <span class="storeName">${s.name}</span>
      <div>
        <button type="button" onclick="change(${i}, -1)">-</button>
        <span id="qty${i}" class="qty zero">0</span>
        <button type="button" onclick="change(${i}, 1)">+</button>
      </div>
    `;

    list.appendChild(row);
  });

  const userButtons = document.getElementById("userButtons");

  CONFIG.users.forEach(u => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.innerText = u.name;
    btn.id = u.id;
    btn.onclick = () => setUser(u.name, u.id);
    userButtons.appendChild(btn);
  });

  const plus = document.createElement("button");
  plus.type = "button";
  plus.innerText = "＋";
  plus.onclick = setCustomUser;
  userButtons.appendChild(plus);

  loadUser();
  load();
  updateAllDisplay();
  updateTotal();

  if (currentUser) {
    setStatus("担当：" + currentUser);
  } else {
    setStatus("担当を選択してください");
  }
}

/* ===== 入力ロジック ===== */
function change(i, val) {
  const name = stores[i].name;
  let current = data[name];

  if (current === null) {
    if (val > 0) data[name] = 0;
  } else {
    if (current === 0 && val < 0) {
      data[name] = null; // 0からマイナスで「？」にする
    } else {
      data[name] = Math.max(0, (current || 0) + val);
    }
  }

  updateDisplay(i);
  updateTotal();
  setStatus("未保存の変更があります");
}

function changeAll(val) {
  stores.forEach((s, i) => {
    let current = data[s.name];

    if (current === null) {
      if (val > 0) data[s.name] = 0;
    } else {
      if (current === 0 && val < 0) {
        data[s.name] = null;
      } else {
        data[s.name] = Math.max(0, (current || 0) + val);
      }
    }

    updateDisplay(i);
  });

  updateTotal();
  setStatus("未保存の変更があります");
}

function updateDisplay(i) {
  const name = stores[i].name;
  const el = document.getElementById("qty" + i);
  const val = data[name];

  if (val === null) {
    el.innerText = "？";
    el.className = "qty unknown";
  } else {
    el.innerText = val;
    el.className = "qty " + (val === 0 ? "zero" : "");
  }
}

function updateAllDisplay() {
  stores.forEach((s, i) => updateDisplay(i));
}

function updateTotal() {
  let sum = 0;

  for (let k in data) {
    if (data[k] !== null) sum += data[k] || 0;
  }

  document.getElementById("total").innerText = "合計：" + sum;
}

/* ===== 共通チェック ===== */
function requireUser() {
  if (!currentUser) {
    alert("担当を選択してください");
    setStatus("担当を選択してください");
    return false;
  }
  return true;
}

function getStorageKey() {
  const safeUser = sanitizeFileName(currentUser || "no_user");
  return `shipment_${today}_${safeUser}`;
}

function setStatus(msg) {
  statusEl.innerText = msg;
}

function getCurrentTimeText() {
  return new Date().toLocaleTimeString("ja-JP", {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}

/* ===== 保存・読み込み ===== */
function save() {
  if (!requireUser()) return;

  const payload = {
    date: today,
    user: currentUser,
    savedAt: new Date().toISOString(),
    data: data
  };

  localStorage.setItem(getStorageKey(), JSON.stringify(payload));

  // 旧形式との互換用。不要なら次の1行は削除しても問題ありません。
  localStorage.setItem("shipment_" + today, JSON.stringify(payload));

  setStatus("保存済み：" + getCurrentTimeText());
  alert("保存OK");
}

function load() {
  let saved = null;

  if (currentUser) {
    saved = localStorage.getItem(getStorageKey());
  }

  // 旧形式データも読み込めるようにする
  if (!saved) {
    saved = localStorage.getItem("shipment_" + today);
  }

  if (!saved) return;

  try {
    const parsed = JSON.parse(saved);
    const loadedData = parsed.data || {};

    stores.forEach((st) => {
      if (Object.prototype.hasOwnProperty.call(loadedData, st.name)) {
        data[st.name] = loadedData[st.name];
      } else {
        data[st.name] = 0;
      }
    });

    if (parsed.user && !currentUser) {
      currentUser = parsed.user;
      localStorage.setItem("user", currentUser);
      activateUserButtonByName(currentUser);
    }
  } catch (e) {
    console.error(e);
    alert("保存データの読み込みに失敗しました");
  }
}

/* ===== LINE共有 ===== */
function shareLine() {
  if (!requireUser()) return;

  let text = `出荷（${today}）担当:${currentUser}\n`;
  let sum = 0;

  stores.forEach(s => {
    const val = data[s.name];
    const disp = val === null ? "?" : val;
    text += `${s.name}:${disp}\n`;
    if (val !== null) sum += val;
  });

  text += `合計:${sum}`;

  setStatus("LINE共有を開きました：" + getCurrentTimeText());
  window.open("https://line.me/R/msg/text/?" + encodeURIComponent(text), "_blank");
}

/* ===== CSV出力 ===== */
function exportCSV() {
  if (!requireUser()) return;

  let csv = "日付,担当,店舗,数量\n";
  let sum = 0;

  stores.forEach(s => {
    const val = data[s.name];
    const disp = val === null ? "?" : val;
    csv += [today, currentUser, s.name, disp].map(csvEscape).join(",") + "\n";
    if (val !== null) sum += val;
  });

  csv += [today, currentUser, "合計", sum].map(csvEscape).join(",") + "\n";

  // Excelでの文字化け対策としてUTF-8 BOMを付ける
  const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
  const blob = new Blob([bom, csv], { type: "text/csv;charset=utf-8" });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);

  const safeUser = sanitizeFileName(currentUser || "no_user");
  const timeStr = new Intl.DateTimeFormat('ja-JP', {
    hour: '2-digit',
    minute: '2-digit',
    hour12: false,
    timeZone: 'Asia/Tokyo'
  }).format(new Date()).replace(/:/g, '');
  a.download = `${today}_${timeStr}_${safeUser}.csv`;

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);

  setStatus("CSV出力済み：" + getCurrentTimeText());
}

function csvEscape(value) {
  const str = String(value ?? "");
  if (/[",\n\r]/.test(str)) {
    return '"' + str.replace(/"/g, '""') + '"';
  }
  return str;
}

function sanitizeFileName(name) {
  return String(name).replace(/[\\/:*?"<>|]/g, "").trim() || "no_user";
}

/* ===== リセット ===== */
function resetAll() {
  if (!confirm("入力内容をリセットしますか？")) return;

  stores.forEach((s, i) => {
    data[s.name] = 0;
    updateDisplay(i);
  });

  updateTotal();
  setStatus("リセットしました。必要なら保存してください");
}

/* ===== 担当 ===== */
function setUser(name, id) {
  currentUser = name;
  localStorage.setItem("user", name);

  document.querySelectorAll("#userButtons button").forEach(b => b.classList.remove("activeUser"));
  if (id) document.getElementById(id)?.classList.add("activeUser");

  setStatus("担当：" + currentUser);
}

function setCustomUser() {
  const n = prompt("担当");
  if (!n) return;

  currentUser = n.trim();
  if (!currentUser) return;

  localStorage.setItem("user", currentUser);
  document.querySelectorAll("#userButtons button").forEach(b => b.classList.remove("activeUser"));

  setStatus("担当：" + currentUser);
}

function loadUser() {
  const u = localStorage.getItem("user");
  if (!u) return;

  currentUser = u;
  activateUserButtonByName(u);
}

function activateUserButtonByName(name) {
  document.querySelectorAll("#userButtons button").forEach(b => b.classList.remove("activeUser"));

  const found = CONFIG.users.find(x => x.name === name);
  if (found) {
    document.getElementById(found.id)?.classList.add("activeUser");
  }
}

/* ===== Service Worker ===== */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(err => {
    console.warn("Service Worker registration failed:", err);
  });
}
</script>

</body>
</html>
