<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">

<title>出荷入力</title>

<style>
body{
  font-family:sans-serif;
  margin:0;
  padding:8px;
  -webkit-tap-highlight-color:transparent;
}

#date{
  font-size:18px;
  margin-bottom:5px;
}

#userButtons button{
  width:110px;
  height:44px;
  font-size:16px;
  margin-right:4px;
  border:none;
  border-radius:6px;
  background:#ddd;
}
.activeUser{
  background:#2196f3!important;
  color:#fff;
}

#list{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:2px solid #999;
  border-radius:6px;
  padding:6px;
}

.row button{
  width:34px;
  height:34px;
  font-size:16px;
}

.qty{
  width:38px;
  height:38px;
  line-height:38px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  border-radius:6px;
}

.zero{ background:#ccc; }
.unknown{ background:orange; color:#fff; }

.footer{
  position:sticky;
  bottom:0;
  background:#fff;
  padding-bottom:env(safe-area-inset-bottom);
}

.allButtons{
  display:flex;
  gap:8px;
  margin:5px 0;
}
.allButtons button{
  flex:1;
  height:44px;
  font-size:18px;
  border:none;
  border-radius:6px;
}
.allButtons button:first-child{background:#fcc;color:#000;}
.allButtons button:last-child{background:#ccf;color:#000;}

#total{
  font-size:18px;
  margin:4px 0;
}

.actionButtons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:5px;
}
.actionButtons button{
  height:40px;
  font-size:13px;
  border:none;
  border-radius:6px;
}
.actionButtons button:nth-child(1){background:#4caf50;color:#fff;}
.actionButtons button:nth-child(2){background:#00c300;color:#fff;}
.actionButtons button:nth-child(3){background:#f44336;color:#fff;}
.actionButtons button:nth-child(4){background:#2196f3;color:#fff;}

button:active{
  transform:scale(0.95);
}
</style>
</head>

<body>

<div id="date"></div>

<div id="userButtons">
  <button onclick="setUser('東伸水産')">東伸水産</button>
  <button onclick="setUser('青山水産')">青山水産</button>
  <button onclick="setUser('カネツル青果')">カネツル青果</button>
  <button onclick="setCustomUser()">＋</button>
</div>

<div id="list"></div>

<div class="footer">

  <div class="allButtons">
    <button onclick="changeAll(-1)">全店 －</button>
    <button onclick="changeAll(1)">全店 ＋</button>
  </div>

  <div id="total">合計：0</div>

  <div class="actionButtons">
    <button onclick="save()">保存</button>
    <button onclick="shareLine()">LINE</button>
    <button onclick="resetAll()">リセット</button>
    <button onclick="exportCSV()">CSV</button>
  </div>

</div>

<script>
const stores=[
"湖西","高塚","北寺島","有玉","引佐",
"磐田","袋井","中野","袋井南","掛川",
"成滝","菊川","静波","石津","井口",
"藤枝","丸子","富士見","清水","竜南","大坪"
];

/* ★ ？対応店舗だけ指定 */
const unknownStores=["清水","竜南","大坪"];

const data={};
let currentUser="東伸水産";

const list=document.getElementById("list");

/* 日付 */
const now=new Date();
const week=["日","月","火","水","木","金","土"];
const today=
now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");

document.getElementById("date").innerText=
`${today}（${week[now.getDay()]}）`;

/* 表示 */
function updateDisplay(i){
  const name=stores[i];
  const el=document.getElementById("qty"+i);

  if(data[name]===null){
    el.innerText="？";
    el.className="qty unknown";
  }else{
    el.innerText=data[name];
    el.className="qty"+(data[name]===0?" zero":"");
  }
}

/* 初期 */
stores.forEach((name,i)=>{
  data[name]=0;

  const isUnknown=unknownStores.includes(name);

  const row=document.createElement("div");
  row.className="row";

  row.innerHTML=`
  <span>${name}</span>
  <div>
    <button onclick="change(${i},-1)">-</button>
    <span id="qty${i}" class="qty zero">0</span>
    <button onclick="change(${i},1)">+</button>
    ${isUnknown ? `<button onclick="toggleUnknown(${i})">？</button>` : ``}
  </div>`;

  list.appendChild(row);
});

/* 個別 */
function change(i,val){
  const name=stores[i];

  if(data[name]===null) data[name]=0;

  data[name]=Math.max(0,data[name]+val);

  updateDisplay(i);
  updateTotal();
}

/* ？ */
function toggleUnknown(i){
  const name=stores[i];

  data[name]= (data[name]===null) ? 0 : null;

  updateDisplay(i);
  updateTotal();
}

/* 全店 */
function changeAll(val){
  for(let i=0;i<stores.length;i++){
    const name=stores[i];

    if(data[name]===null) continue; // ★ 不明は触らない

    data[name]=Math.max(0,data[name]+val);

    updateDisplay(i);
  }
  updateTotal();
}

/* 合計 */
function updateTotal(){
  let sum=0;
  for(let k in data){
    if(data[k]!==null) sum+=data[k];
  }
  document.getElementById("total").innerText="合計："+sum;
}

/* 保存 */
function save(){
  localStorage.setItem("shipment",JSON.stringify(data));
  alert("保存OK");
}

/* LINE */
function shareLine(){
  let text=`出荷報告（${today}）\n担当：${currentUser}\n\n`;

  let sum=0;
  for(let k in data){
    if(data[k]!==null) sum+=data[k];
  }

  for(let n of stores){
    if(data[n]===null){
      text+=`${n}：不明\n`;
    }else if(data[n]>0){
      text+=`${n}：${data[n]}\n`;
    }
  }

  text+=`合計：${sum}`;

  window.open("https://line.me/R/msg/text/?"+encodeURIComponent(text));
}

/* CSV */
function exportCSV(){
  let csv="店舗,数量\n";

  for(let n of stores){
    const val=(data[n]===null)?"不明":data[n];
    csv+=`${n},${val}\n`;
  }

  const blob=new Blob([csv],{type:"text/csv"});
  const link=document.createElement("a");
  link.href=URL.createObjectURL(blob);
  link.download="出荷.csv";
  link.click();
}

/* リセット */
function resetAll(){
  if(!confirm("リセットしますか？")) return;

  for(let i=0;i<stores.length;i++){
    data[stores[i]]=0;
    updateDisplay(i);
  }
  updateTotal();
}

/* 担当 */
function setUser(name){
  currentUser=name;
}
function setCustomUser(){
  const name=prompt("担当名入力");
  if(!name) return;
  currentUser=name;
}
</script>

</body>
</html>
